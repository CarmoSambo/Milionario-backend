spring.application.name=Milionario
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
# CORRIGIDO: senha agora lida de variável de ambiente DB_PASSWORD.
# Se a variável não estiver definida, usa "0000" como valor por defeito (apenas para desenvolvimento local).
# Em produção, define sempre a variável de ambiente: export DB_PASSWORD=a_tua_senha
spring.datasource.password=${DB_PASSWORD:0000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jackson.date-format=dd-MM-yyyy
spring.main.lazy-initialization=true
spring.jpa.show-sql=true

# Permitir pedidos do frontend React (porta 3000)
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE
spring.web.cors.allow-credentials=true
