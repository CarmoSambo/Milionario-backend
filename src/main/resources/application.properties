spring.application.name=Milionario

# Porta do servidor: o Render injeta a variável PORT automaticamente.
server.port=${PORT:8080}

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Valores por defeito para desenvolvimento local (H2/Postgres local).
# Em produção (Docker/Render), estes são sobrepostos automaticamente pelas
# variáveis de ambiente SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME e
# SPRING_DATASOURCE_PASSWORD (o Spring Boot faz "relaxed binding" de env vars
# para estas propriedades sem precisar de sintaxe ${...} aqui).
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=0000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jackson.date-format=dd-MM-yyyy
spring.main.lazy-initialization=true
spring.jpa.show-sql=true

# Origens permitidas para CORS (ver CorsConfig.java). Em produção, define a
# variável de ambiente CORS_ALLOWED_ORIGINS com uma lista separada por vírgulas.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://milionario-frontend.vercel.app}
